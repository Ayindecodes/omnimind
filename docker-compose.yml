services:
  postgres:
    image: postgres:16-alpine
    container_name: omnimind-postgres
    environment:
      POSTGRES_USER: omnimind
      POSTGRES_PASSWORD: omnimind
      POSTGRES_DB: omnimind
    ports:
      - "5432:5432"
    volumes:
      - omnimind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnimind -d omnimind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  omnimind_pgdata:
